kind = "web"
previewPath = "/"
title = "DEBUNKED. — Madden 26 Meta Engine"
version = "1.0.0"
id = "artifacts/debunked"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19264

[services.development]
run = "pnpm --filter @workspace/debunked run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/debunked", "run", "build" ]
publicDir = "artifacts/debunked/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19264"
BASE_PATH = "/"
